# P1 portable Pod template — one Pod per tenant, VM-grade isolation.
# Works on ACK 安全沙箱 (Kata microVM via runtimeClassName) and adapts to ECI.
# Replace REPLACE_TID / REGISTRY before applying (the orchestrator templates these).
apiVersion: v1
kind: Pod
metadata:
  name: vk-tenant-REPLACE_TID
  labels:
    app: vibe-kanban-sandbox
    tenant: REPLACE_TID
spec:
  # ACK 安全沙箱 (Kata) gives each Pod its own guest kernel in a microVM.
  # For ECI, VM isolation is implicit and this field is selected differently
  # (namespace label / annotation) — verify against your cluster.
  # SECURITY-CRITICAL: removing this line drops the Pod to shared-kernel (runc)
  # isolation — unsafe for untrusted tenants. Enforce its presence via a namespace
  # PodSecurity policy / admission webhook so it cannot be silently stripped.
  runtimeClassName: sandboxed
  # Never hand Kubernetes/RAM credentials to tenant code.
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001                  # makes mounted PVCs writable by uid 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: vk
      image: REGISTRY/vibe-kanban-sandbox:latest
      imagePullPolicy: IfNotPresent
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      env:
        - name: VK_ALLOWED_ORIGINS
          value: "https://t-REPLACE_TID.app.example.com"
        # LLM proxy base URLs + per-tenant scoped tokens come from a Secret, e.g.:
        # - name: ANTHROPIC_BASE_URL
        #   valueFrom: { secretKeyRef: { name: vk-tenant-REPLACE_TID, key: anthropic_base_url } }
      ports:
        - containerPort: 8080
      resources:
        requests: { cpu: "500m", memory: 1Gi }
        limits:   { cpu: "2", memory: 4Gi, ephemeral-storage: 2Gi }
      volumeMounts:
        - { name: data, mountPath: /data }                 # state: db, config, creds (secret!)
        - { name: work, mountPath: /var/tmp/vibe-kanban }  # git worktrees (exec-capable)
        - { name: tmp,  mountPath: /tmp }                   # scratch (tmpfs)
      readinessProbe:
        httpGet: { path: /api/health, port: 8080 }
        initialDelaySeconds: 10
        periodSeconds: 10
      livenessProbe:
        httpGet: { path: /api/health, port: 8080 }
        initialDelaySeconds: 30
        periodSeconds: 20
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
        sizeLimit: 512Mi
    # Long-lived tenant -> PVCs (persist state). Short/ephemeral task -> swap BOTH
    # of these for `emptyDir: {}` so the sandbox is fully disposable.
    - name: data
      # Use an ENCRYPTED storage class: db.v2.sqlite and credentials.json (OAuth)
      # are stored PLAINTEXT at rest. Never share this PVC across tenants.
      persistentVolumeClaim:
        claimName: vk-data-REPLACE_TID
    - name: work
      persistentVolumeClaim:
        claimName: vk-work-REPLACE_TID
